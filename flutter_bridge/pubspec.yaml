name: flutter_bridge
description: >
  Tokenizador, post-procesador BIO y extractor TFLite para EpiDiagnostix-Mayab.
  Paquete Flutter — usa tflite_flutter para inferencia on-device.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
